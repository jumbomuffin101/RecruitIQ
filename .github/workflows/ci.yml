name: RecruitIQ CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: recruitiq_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d recruitiq_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/recruitiq_test?schema=public
      DATABASE_URL_TEST: postgresql://postgres:postgres@localhost:5432/recruitiq_test?schema=public
      AUTH_SECRET: recruitiq-ci-auth-secret-not-for-production
      AUTH_TRUST_HOST: "true"
      AUTH_URL: http://localhost:3100
      AUTH_GITHUB_ID: ci-placeholder
      AUTH_GITHUB_SECRET: ci-placeholder
      RECRUITIQ_TEST_AUTH: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      - run: npx prisma validate
      - run: npx prisma migrate deploy
      - run: npm run lint
      - run: npm test
      - run: npm run test:integration
      - run: npm run build
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
